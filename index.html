<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard ABL Prime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div id="status" class="text-center p-4 text-xs font-bold text-slate-400 uppercase">Sincronizando dados...</div>

    <div class="max-w-[1200px] mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black text-slate-800 uppercase italic">Performance 2026</h1>
            <select id="filtro" class="border-2 border-slate-200 rounded-lg px-3 py-1 font-bold text-slate-600 outline-none"></select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <canvas id="chart" style="height: 400px;"></canvas>
            </div>
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-[10px] font-black text-blue-600 uppercase mb-2">Realizado Total</p>
                    <p id="vReal" class="text-3xl font-black text-slate-900">R$ 0,0M</p>
                </div>
                <div class="bg-slate-900 p-6 rounded-2xl shadow-sm text-center">
                    <p class="text-slate-400 text-[10px] font-black uppercase mb-2">Gap para Meta</p>
                    <p id="vGap" class="text-3xl font-black text-orange-400">R$ 0,0M</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LINK DA SUA PLANILHA
        const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGfqlq3KXkna2VgU25_kUWFz8CtEFsGCXOdpfOUM4e_BchIM5ebBHi2wuFQ_DunrIY-XAe5Z_-fSSn/pub?gid=267487522&single=true&output=csv';

        async function dataSync() {
            try {
                // O segredo para não dar erro: usar um proxy que libera o acesso
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(URL)}`);
                const csv = await res.text();
                
                const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                const clean = v => parseFloat(v?.replace('R$', '').replace(/\./g, '').replace(',', '.').trim() || 0);

                window.db = lines.slice(1).map(l => {
                    const c = l.split(lines[0].includes(';') ? ';' : ',');
                    return { p: c[0], m: c[1], meta: clean(c[2]), real: clean(c[3]), u: clean(c[5]) };
                }).filter(d => d.p);

                // Setup Filtro
                const f = document.getElementById('filtro');
                f.innerHTML = '<option value="all">CONSOLIDADO GERAL</option>';
                [...new Set(window.db.map(x => x.p))].forEach(p => {
                    f.innerHTML += `<option value="${p}">${p.toUpperCase()}</option>`;
                });

                update('all');
                document.getElementById('status').innerText = 'Dados Atualizados';
            } catch (e) {
                document.getElementById('status').innerText = 'Erro ao carregar planilha';
            }
        }

        function update(sel) {
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const d = sel === 'all' ? window.db : window.db.filter(x => x.p === sel);

            const vM = meses.map(m => d.filter(x => x.m.includes(m)).reduce((a,b) => a + b.meta, 0));
            const vR = meses.map(m => d.filter(x => x.m.includes(m)).reduce((a,b) => a + b.real, 0));
            const uR = meses.map(m => d.filter(x => x.m.includes(m)).reduce((a,b) => a + b.u, 0));

            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(document.getElementById('chart'), {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [
                        { label: 'REAL', data: vR, backgroundColor: '#2563eb', borderRadius: 5, u: uR },
                        { label: 'META', data: vM, backgroundColor: '#e2e8f0', borderRadius: 5, u: [] }
                    ]
                },
                options: {
                    plugins: {
                        datalabels: {
                            anchor: 'end', align: 'top', 
                            formatter: (v, ctx) => v > 0 ? v.toFixed(1)+'M' : '',
                            font: { weight: 'bold', size: 9 }
                        }
                    }
                }
            });

            const totalR = vR.reduce((a,b)=>a+b, 0);
            const totalM = vM.reduce((a,b)=>a+b, 0);
            document.getElementById('vReal').innerText = `R$ ${totalR.toFixed(1)}M`;
            document.getElementById('vGap').innerText = `R$ ${Math.max(0, totalM - totalR).toFixed(1)}M`;
        }

        document.getElementById('filtro').addEventListener('change', e => update(e.target.value));
        Chart.register(ChartDataLabels);
        dataSync();
    </script>
</body>
</html>
